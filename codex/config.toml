[mcp_servers.bosgenesis_k8s]
enabled = true
url = "http://k8s-inspector.bosgenesis.local/mcp"
startup_timeout_sec = 20
tool_timeout_sec = 120
default_tools_approval_mode = "prompt"

enabled_tools = [
  "k8s_namespace_summary",
  "k8s_list_pods",
  "k8s_describe_pod",
  "k8s_get_pod_logs",
  "k8s_list_services",
  "k8s_list_configmaps",
  "k8s_get_configmap",
  "k8s_list_pvcs",
  "k8s_describe_pvc",
  "k8s_list_deployments",
  "k8s_list_statefulsets",
  "k8s_list_ingresses",
  "k8s_list_events",
  "k8s_apply_manifest",
  "k8s_create_resource",
  "k8s_update_resource",
  "k8s_create_pvc",
  "k8s_update_pvc",
  "k8s_create_ephemeral_secret",
  "k8s_delete_ephemeral_secret",
  "k8s_delete_resource",
  "k8s_delete_pvc",
  "k8s_delete_collection",
  "k8s_delete_pvc_collection",
  "k8s_patch_resource",
  "k8s_patch_pvc",
  "k8s_bind_pod",
  "k8s_scale_deployment",
]

[mcp_servers.bosgenesis_k8s.tools.k8s_apply_manifest]
approval_mode = "prompt"

[mcp_servers.bosgenesis_k8s.tools.k8s_create_resource]
approval_mode = "prompt"

[mcp_servers.bosgenesis_k8s.tools.k8s_update_resource]
approval_mode = "prompt"

[mcp_servers.bosgenesis_k8s.tools.k8s_create_pvc]
