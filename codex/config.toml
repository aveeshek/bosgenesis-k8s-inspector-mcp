[mcp_servers.bosgenesis_k8s.tools.k8s_update_pvc]
approval_mode = "prompt"

[mcp_servers.bosgenesis_k8s.tools.k8s_create_ephemeral_secret]
approval_mode = "prompt"

[mcp_servers.bosgenesis_k8s.tools.k8s_delete_ephemeral_secret]
approval_mode = "prompt"

[mcp_servers.bosgenesis_k8s.tools.k8s_delete_resource]
approval_mode = "prompt"

[mcp_servers.bosgenesis_k8s.tools.k8s_delete_pvc]
approval_mode = "prompt"

[mcp_servers.bosgenesis_k8s.tools.k8s_delete_collection]
approval_mode = "prompt"

[mcp_servers.bosgenesis_k8s.tools.k8s_delete_pvc_collection]
approval_mode = "prompt"

[mcp_servers.bosgenesis_k8s.tools.k8s_patch_resource]
approval_mode = "prompt"

[mcp_servers.bosgenesis_k8s.tools.k8s_patch_pvc]
approval_mode = "prompt"

[mcp_servers.bosgenesis_k8s.tools.k8s_bind_pod]
approval_mode = "prompt"

