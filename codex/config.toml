[mcp_servers.bosgenesis_k8s]
enabled = true
command = "/home/taieuser/bosgenesis-k8s-inspector-mcp/.venv/bin/python"
args = ["-m", "bosgenesis_k8s_inspector_mcp.server_mcp"]
cwd = "/home/taieuser/bosgenesis-k8s-inspector-mcp"
startup_timeout_sec = 20
tool_timeout_sec = 120
default_tools_approval_mode = "prompt"

enabled_tools = [
  "k8s_namespace_summary",
  "k8s_list_pods",
  "k8s_describe_pod",
  "k8s_get_pod_logs",
  "k8s_list_services",
  "k8s_list_deployments",
  "k8s_list_statefulsets",
  "k8s_list_ingresses",
  "k8s_list_events",
  "k8s_apply_manifest",
  "k8s_delete_resource",
  "k8s_patch_resource",
  "k8s_scale_deployment"
]

[mcp_servers.bosgenesis_k8s.env]
PYTHONPATH = "/home/taieuser/bosgenesis-k8s-inspector-mcp/src"
BOSGENESIS_SETTINGS_FILE = "/home/taieuser/bosgenesis-k8s-inspector-mcp/config/settings.yaml"
BOSGENESIS_POLICY_FILE = "/home/taieuser/bosgenesis-k8s-inspector-mcp/config/policy.yaml"
BOSGENESIS_ALLOWED_NAMESPACE = "bosgenesis"
BOSGENESIS_K8S_AUTH_MODE = "kubeconfig"
BOSGENESIS_KUBECONFIG_PATH = "/home/taieuser/.kube/config"
BOSGENESIS_OTEL_ENABLED = "false"

[mcp_servers.bosgenesis_k8s.tools.k8s_apply_manifest]
approval_mode = "prompt"

[mcp_servers.bosgenesis_k8s.tools.k8s_delete_resource]
approval_mode = "prompt"

[mcp_servers.bosgenesis_k8s.tools.k8s_patch_resource]
approval_mode = "prompt"

[mcp_servers.bosgenesis_k8s.tools.k8s_scale_deployment]
approval_mode = "prompt"